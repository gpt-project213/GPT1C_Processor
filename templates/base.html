<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ title }}</title>
<style>
:root{--bg:#f5f5f5;--wrap-bg:#fff;--ink:#2c3e50;--muted:#666;--accent:#007bff;--good:#28a745;--bad:#dc3545;--warn:#ffc107;--th-bg:#f8f9fa;--border:#ddd;--shadow:0 2px 8px rgba(0,0,0,.10)}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:15px;color:var(--ink);font-size:14px;line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;background:var(--wrap-bg);padding:24px 28px;border-radius:10px;box-shadow:var(--shadow)}
h1{color:var(--ink);font-size:22px;margin:0 0 8px}
h2{color:var(--ink);font-size:17px;margin:28px 0 8px;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.section{font-weight:700;color:var(--ink);margin:20px 0 6px;font-size:14px}
.summary{margin:10px 0;font-weight:600;color:var(--good)}
.note{color:var(--muted);font-size:12px;margin-top:16px}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px;background:#fff;margin:12px 0}
table{width:100%;border-collapse:collapse}
th{background:var(--th-bg);font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid #eee;vertical-align:top}
tr:hover{background:var(--th-bg)}
.A{background:#d4edda!important}.B{background:#fff3cd!important}.C{background:#f8d7da!important}
.recs{background:#fff3cd;border-left:4px solid var(--warn);padding:12px 16px;border-radius:4px;margin:14px 0}
.footer{margin-top:24px;padding-top:14px;border-top:1px solid #eee;text-align:center;color:#bbb;font-size:11px}
@media(max-width:768px){
  body{padding:10px}
  .wrap{padding:14px}
  h1{font-size:18px}
  h2{font-size:15px}
  table{min-width:auto!important;table-layout:auto}
  th,td{padding:7px 8px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>{{ title }}</h1>
  {% block content %}{% endblock %}
  <div class="note">{{ note }}</div>
</div>
</body>
</html>
